name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'  # Midnight every night
  workflow_dispatch:      # Allow manual triggering

# Hardening: Explicitly set minimum permissions
permissions:
  contents: read

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      # Hardening: Pinning to SHAs (v6.0.2)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            # Check if there were any commits in the last 24 hours
            if [ "$(git log --since="24 hours ago" | wc -l)" -gt 0 ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    needs: check_changes
    if: needs.check_changes.outputs.has_changes == 'true'
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Poetry
        # Hardening: Pinning third-party action (v1.4.1)
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        shell: bash
        run: poetry install

      - name: Build binary
        shell: bash
        run: poetry run python scripts/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mc-helper-${{ matrix.os }}
          path: |
            dist/mc-helper
            dist/mc-helper.exe
          if-no-files-found: ignore
