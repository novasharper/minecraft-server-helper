# example-config.yaml — annotated reference covering all install modes.
# Use `modpack` for modpacks and server packs, or `mods` for individual mods.
# `modpack` and `mods` can be combined (mods are layered on top).

server:
  type: fabric                  # vanilla | forge | neoforge | fabric | quilt | paper | purpur
  minecraft_version: "1.21.1"   # specific version, LATEST, or SNAPSHOT
  loader_version: LATEST        # fabric/forge/neoforge/quilt only; ignored for vanilla/paper/purpur
  output_dir: ./server
  eula: true
  memory: 2G
  properties:                   # written verbatim to server.properties
    difficulty: normal
    max_players: 20
    motd: "A Minecraft Server"
    online_mode: true

# ── Option A: Install a modpack ───────────────────────────────────────────────
modpack:
  platform: modrinth            # modrinth | curseforge | ftb | github | url

  # ── Modrinth source ──
  source:
    project: "better-mc-fabric" # slug, project ID, page URL, or local .mrpack path
    version: LATEST
    version_type: release       # release | beta | alpha

  # ── CurseForge source (requires CF_API_KEY) ──
  # source:
  #   api_key: ${CF_API_KEY}
  #   slug: "all-the-mods-9"
  #   file_id: ~                # null = newest matching file
  #   filename_matcher: ~       # optional substring filter on filename

  # ── FTB source ──
  # source:
  #   pack_id: 130              # numeric FTB pack ID (required)
  #   version_id: ~             # null = latest release (or matching version_type)
  #   api_key: ${FTB_API_KEY}   # only needed for private packs; defaults to "public"
  #   version_type: release

  # ── GitHub source (pre-assembled server pack from a GitHub release) ──
  # source:
  #   repo: "ATM-Team/ATM-10"  # owner/repo
  #   tag: LATEST               # specific tag or LATEST
  #   asset: "*server*"         # glob to select asset; picks first if omitted
  #   token: ${GITHUB_TOKEN}    # optional, for private repos
  #   strip_components: 1       # strip N leading path segments (like tar --strip-components)
  #   force_update: false       # re-extract even if checksum matches
  #   start_artifact: ~         # explicit start script/jar; auto-detected if omitted

  # ── URL source (pre-assembled server pack from a direct URL) ──
  # source:
  #   url: https://example.com/mypack-server.zip
  #   strip_components: 0
  #   force_update: false
  #   start_artifact: ~

  # Shared fields (all platforms)
  exclude_mods: []              # glob patterns: skip downloads (modrinth/curseforge/ftb) or rename to .disabled (github/url)
  force_include_mods: []        # slugs/IDs to always include even if filtered (CurseForge only)
  overrides_exclusions: []      # paths inside overrides/ to skip (Modrinth/CurseForge only)

# ── Option B: Install individual mods ────────────────────────────────────────
# mods:
#   modrinth:
#     - fabric-api                # slug → latest release for mc_version + loader
#     - "sodium:mc1.21-0.6.0"    # slug:version
#     - "P7dR8mSH"               # project ID
#   curseforge:
#     api_key: ${CF_API_KEY}
#     files:
#       - jei                     # slug → latest file
#       - "jei:4593548"           # slug:fileId
#       - "238222"                # project ID
#   urls:
#     - https://example.com/mymod-1.0.jar
